name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: get_version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update package.json version
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          npm version "$VERSION" --git-tag-version=false
          echo "Updated package.json to version: $VERSION"

      - name: Commit version changes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $VERSION"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: vsce package
        continue-on-error: false

      - name: Get VSIX filename
        id: get_filename
        run: |
          VSIX_FILE=$(ls *.vsix)
          echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "VSIX filename: $VSIX_FILE"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-release
          path: ${{ steps.get_filename.outputs.VSIX_FILE }}
          retention-days: 90

      - name: Publish to VSCode Marketplace
        run: |
          vsce publish -p ${{ secrets.VSCE_PAT }}

      - name: Install OVSX
        run: npm install -g ovsx

      - name: Publish to Open VSX
        run: |
          ovsx publish -p ${{ secrets.OPENVSX_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.get_filename.outputs.VSIX_FILE }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version changes to main
        run: |
          git push origin main

      - name: Release summary
        run: |
          echo "## 🎉 Release Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **VSIX**: ${{ steps.get_filename.outputs.VSIX_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **VSCode Marketplace**: Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Open VSX**: Published" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release**: Created" >> $GITHUB_STEP_SUMMARY
