name: CI Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Test Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version info
        id: version_info
        run: |
          # 获取 package.json 中的当前版本
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          # 获取短 commit SHA
          SHORT_SHA=${{ github.sha }}
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Version: $CURRENT_VERSION"
          echo "Short SHA: $SHORT_SHA"

      - name: Create test version string
        id: test_version
        run: |
          BASE_VERSION="${{ steps.version_info.outputs.CURRENT_VERSION }}"
          SHA_SUFFIX="${{ steps.version_info.outputs.SHORT_SHA }}"
          TEST_VERSION="${BASE_VERSION}.sha.${SHA_SUFFIX}"
          echo "TEST_VERSION=$TEST_VERSION" >> $GITHUB_OUTPUT
          echo "Test version: $TEST_VERSION"

      - name: Update package.json for test build
        run: |
          TEST_VERSION="${{ steps.test_version.outputs.TEST_VERSION }}"
          # 使用 npm version 但不创建 git tag 或 commit
          npm version "$TEST_VERSION" --git-tag-version=false --no-git-tag-version
          echo "Updated package.json to: $TEST_VERSION"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: vsce package
        continue-on-error: false

      - name: Get VSIX filename
        id: get_filename
        run: |
          VSIX_FILE=$(ls *.vsix)
          echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "VSIX filename: $VSIX_FILE"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-test-${{ steps.version_info.outputs.SHORT_SHA }}
          path: ${{ steps.get_filename.outputs.VSIX_FILE }}
          retention-days: 7

      - name: Build summary
        run: |
          echo "## 📦 Test Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Base Version**: ${{ steps.version_info.outputs.CURRENT_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Version**: ${{ steps.test_version.outputs.TEST_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ steps.version_info.outputs.SHORT_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "- **VSIX**: ${{ steps.get_filename.outputs.VSIX_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ℹ️ Note" >> $GITHUB_STEP_SUMMARY
          echo "This is a test build. The version number includes the commit SHA for identification." >> $GITHUB_STEP_SUMMARY
          echo "Download the VSIX from the Artifacts section below." >> $GITHUB_STEP_SUMMARY
